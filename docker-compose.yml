volumes:
  pentaract-db-volume:
    name: pentaract-db-volume
  pentaract-work-volume:
    name: pentaract-work-volume
  telegram-bot-api-data:
    name: telegram-bot-api-data

networks:
  pentaract-network:
    name: pentaract-network

services:
  pentaract:
    container_name: pentaract
    image: pentaract
    build: .
    env_file:
      - .env
    ports:
      - ${PORT}:8000
    restart: unless-stopped
    depends_on:
      - db
      - telegram-bot-api
    volumes:
      - pentaract-work-volume:/work
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    networks:
      - pentaract-network

  telegram-bot-api:
    container_name: telegram-bot-api
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    restart: unless-stopped
    ports:
      - ${TELEGRAM_BOT_API_PORT:-8081}:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - pentaract-network

  db:
    container_name: pentaract_db
    image: postgres:15.0-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: pg_isready --username=${DATABASE_USER} --dbname=${DATABASE_NAME}
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pentaract-db-volume:/var/lib/postgresql/data
    networks:
      - pentaract-network
